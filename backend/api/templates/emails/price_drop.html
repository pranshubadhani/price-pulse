<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        line-height: 1.6;
        color: #333;
      }
      .container {
        max-width: 600px;
        margin: 0 auto;
        padding: 20px;
        border: 1px solid #ddd;
        border-radius: 8px;
      }
      .header {
        text-align: center;
        padding: 20px 0;
        border-bottom: 2px solid #0e9f6e;
      }
      .header h1 {
        color: #0e9f6e;
        margin: 0;
      }
      .alert-box {
        background-color: #f0fdf4;
        border-left: 4px solid #0e9f6e;
        padding: 15px;
        margin: 20px 0;
        border-radius: 4px;
      }
      .price-highlight {
        font-size: 24px;
        font-weight: bold;
        color: #0e9f6e;
      }
      .content {
        padding: 20px 0;
      }
      .cta-button {
        display: inline-block;
        padding: 10px 20px;
        margin: 20px 0;
        background-color: #0e9f6e;
        color: white;
        text-decoration: none;
        border-radius: 4px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>🎉 Price Drop Alert</h1>
      </div>
      <div class="content">
        <p>Great news!</p>
        <div class="alert-box">
          <p><strong>{{ product_title }}</strong></p>
          <p class="price-highlight">{{ current_price }}</p>
          <p style="color: #666; font-size: 14px">
            This is below your target price of {{ target_price }}
          </p>
        </div>
        <p>
          <a href="{{ product_url }}" class="cta-button">View Product</a>
        </p>
        <p>
          Check your PricePulse dashboard to see the full price history and manage
          your alerts.
        </p>
        <p>— The PricePulse Team</p>
      </div>
    </div>
  </body>
</html>
